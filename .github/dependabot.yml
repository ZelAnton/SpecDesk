version: 2

# Keep GitHub Actions, NuGet, and npm dependencies current. The nuget ecosystem
# reads central package versions from Directory.Packages.props; the npm ecosystem
# tracks webview/package.json; the github-actions ecosystem bumps the action tags
# pinned in .github/workflows/*.yml.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: CI
    groups:
      # One PR per weekly run for all action bumps, instead of one PR per action.
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: Update
    groups:
      # One PR per weekly run for routine bumps keeps the changelog auto-fill tidy.
      nuget-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /webview
    schedule:
      interval: weekly
    commit-message:
      prefix: Update
    groups:
      # One PR per weekly run for routine bumps. Major bumps arrive as individual
      # PRs for isolated review.
      package-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
