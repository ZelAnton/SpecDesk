name: Layer 2 nightly (full-app e2e)

# Rung 5 (docs/testing.md) drives the REAL SpecDesk.Host.exe (Photino + WebView2) over CDP against a
# disposable fixture repo; that needs a real window + WebView2 runtime, so it stays out of the
# push/PR `ci.yml` pipeline and runs here instead: nightly on a schedule, plus on demand. See
# docs/testing.md → "Layer 2 — full-app over CDP (rung 5)" for the first-run confirmation status.
on:
  schedule:
    # 03:17 UTC nightly — off the hour so it doesn't pile onto GitHub's on-the-hour scheduling spike.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: layer2-nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  full-app-e2e:
    name: e2e (Layer 2 - full app over CDP, windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      # One Node (pinned by webview/.nvmrc) for both the host build's BundleWebview target (invoked by
      # the dotnet build step below) and the e2e package itself; cache the npm store keyed on both
      # lockfiles, matching the e2e-webview job in ci.yml.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: webview/.nvmrc
          cache: npm
          cache-dependency-path: |
            webview/package-lock.json
            e2e/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      # Playwright transpiles TS at run time WITHOUT type-checking (same rationale as the e2e-webview
      # job in ci.yml) — gate the full-app spec types explicitly before spending time on a real launch.
      - name: Typecheck e2e
        run: npm run typecheck
        working-directory: e2e

      # Build SpecDesk.Host ONCE here, with the exact recipe e2e/lib/app-process.ts's buildHost() uses
      # locally (`dotnet build … -c Debug`, webview bundled — no -p:SkipWebview). Each full-app spec
      # file's own beforeAll calls buildHost() again; E2E_SKIP_BUILD=1 on the run step below turns that
      # into a no-op so the host is built exactly once per job instead of once per spec file.
      - name: Build SpecDesk.Host (Debug, webview bundled)
        run: dotnet build src/SpecDesk.Host/SpecDesk.Host.csproj -c Debug

      # The real Photino/WebView2 window over CDP — see docs/testing.md for what this proves and the
      # first-run confirmation caveat. `npm run e2e:app` is required (never a bare `playwright test
      # --project=full-app`): its `--workers=1` is the real concurrency guard for the temp-run-dir sweep.
      - name: Run Layer 2 E2E (full-app over CDP)
        run: npm run e2e:app
        working-directory: e2e
        env:
          E2E_SKIP_BUILD: '1'

      # Artifacts (screenshots, geometry.json, trace-ring.json, app-log.txt) land under
      # e2e/../artifacts/e2e (repo-root artifacts/e2e) on any failing scenario, plus a final.png on
      # success — upload on every outcome so a red nightly run is diagnosable without re-running.
      - name: Upload Layer 2 E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: layer2-e2e-artifacts
          path: artifacts/e2e/**
          if-no-files-found: ignore
