name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  fantomas:
    name: F# format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore dotnet tools
        run: dotnet tool restore

      # Fantomas is the canonical F# formatter (AGENTS.md); this gate fails on any
      # unformatted .fs file under src/ or tests/ instead of relying on discipline.
      - name: Check F# formatting
        run: dotnet fantomas --check src tests

  test:
    name: dotnet (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      # Cache the global NuGet package folder across runs. Keyed on the central
      # version files so the cache invalidates only when dependencies change.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore SpecDesk.slnx

      # -p:SkipWebview=true skips the SpecDesk.Host BundleWebview target — this job has no
      # Node.js; the webview is built and tested in the separate `webview` job below.
      - name: Build
        run: dotnet build SpecDesk.slnx --no-restore --configuration Release -p:SkipWebview=true

      - name: Test
        run: dotnet test SpecDesk.slnx --no-build --configuration Release -p:SkipWebview=true --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      # Test results are uploaded even when the Test step fails, so a red CI run
      # can be diagnosed from the .trx without re-running locally.
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/*.trx
          if-no-files-found: ignore

  webview:
    name: webview (typecheck + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webview
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # setup-node installs the Node.js pinned by webview/.nvmrc and caches the
      # npm store, keyed on the committed lockfile.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: webview/.nvmrc
          cache: npm
          cache-dependency-path: webview/package-lock.json

      # `npm ci` installs exactly the committed lockfile (reproducible; no drift).
      - run: npm ci

      # `tsc --noEmit` over src + tests — the warnings-as-errors gate for types.
      - run: npm run typecheck

      # `biome check .` checks formatting AND the lint set (non-zero on any diff).
      - run: npm run lint

      - run: npm test

      # Exercise the esbuild pipeline (output is not committed — wwwroot/ is git-ignored).
      - run: npm run bundle

      # Delivery gate (T-108): drive the freshly-built wwwroot/webview.js through the REAL Split wiring
      # (no coordinator/height-sync/editor doubles) to prove scroll-sync survives in the shipped bundle,
      # not just in the isolated unit suites. Run after `npm run bundle` so it validates the artifact just
      # produced; it re-runs the standard bundle process and checks the T-107 manifest itself, so the same
      # command is what the processor invokes against the restored main working copy after publish.
      - run: npm run test:delivery

  e2e-webview:
    name: e2e (Layer 1 - webview-mock, real Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # One Node (pinned by webview/.nvmrc) for both packages; cache the npm store keyed on BOTH
      # lockfiles since this job installs webview AND e2e dependencies.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: webview/.nvmrc
          cache: npm
          cache-dependency-path: |
            webview/package-lock.json
            e2e/package-lock.json

      # The Layer 1 global-setup builds the bundle via webview/scripts/bundle.mjs, which imports
      # esbuild from webview/node_modules — so the webview deps must be installed here too, not just
      # e2e's, or every scenario fails at setup with ERR_MODULE_NOT_FOUND.
      - name: Install webview dependencies
        run: npm ci
        working-directory: webview

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      # Playwright transpiles TS at run time WITHOUT type-checking, so a type error in the e2e sources
      # would otherwise ship silently — gate their types explicitly (no browser needed for this).
      - name: Typecheck e2e
        run: npm run typecheck
        working-directory: e2e

      # Cache Playwright's browser download across runs, keyed on the e2e lockfile (which pins the
      # Playwright version and thus the exact Chromium build).
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      # `npm ci` does not fetch the browser binary; --with-deps also installs the OS libraries
      # Chromium needs on ubuntu (libnss3/libnspr4/...). A browser cache hit still runs this cheaply.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      # Real-Chromium Layer 1 (webview-mock): global-setup rebuilds and verifies the bundle, then the
      # scenarios assert real rendered geometry (spacers, alignment, indentation, scroll coupling).
      - name: Run Layer 1 E2E
        run: npm run e2e
        working-directory: e2e

      # The failure-artifact bundle (failure.png + geometry.json + console.log + trace-ring.json, and
      # a success final.png) lands under artifacts/e2e; upload it even on failure so a red run is
      # diagnosable from the screenshot + numbers without re-running.
      - name: Upload E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: artifacts/e2e/**
          if-no-files-found: ignore
