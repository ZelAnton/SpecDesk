<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpecDesk</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #ddd;
        background: #fafafa;
      }
      #toolbar button {
        padding: 0.3rem 0.8rem;
      }
      /* The three-mode segmented control (code / split / formatted). The active mode's button is
         filled; the group reads as one control with shared borders. */
      #view-modes {
        display: inline-flex;
      }
      #view-modes button + button {
        border-left: none;
      }
      #view-modes button[aria-pressed="true"] {
        background: #1a1a1a;
        color: #fff;
      }
      /* Inline prompts shown below the toolbar: naming a draft (on Edit) and the version note (on
         Save version). The `display` is scoped to :not([hidden]) so each bar is genuinely hidden
         until revealed — an unscoped `#id { display: flex }` would out-specify the user-agent
         `[hidden] { display: none }` rule and leak the bar (the bug this replaces). */
      #branch-name-bar:not([hidden]),
      #version-note-bar:not([hidden]) {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.75rem;
        border-bottom: 1px solid #ddd;
        font-size: 0.85rem;
      }
      #branch-name-bar {
        background: #e7f0ff;
      }
      #version-note-bar {
        background: #fff7d6;
      }
      #branch-name-bar input,
      #version-note-bar input,
      #version-note-bar textarea {
        flex: 1;
        min-width: 0;
        padding: 0.3rem 0.5rem;
        font: inherit;
      }
      #version-note-bar textarea {
        resize: vertical;
      }
      #branch-name-bar button,
      #version-note-bar button {
        padding: 0.3rem 0.8rem;
      }
      /* The ⌄ expand affordance is a compact square. */
      #version-note-expand {
        padding: 0.3rem 0.5rem;
        line-height: 1;
      }
      #status {
        margin-left: auto;
        color: #666;
        font-size: 0.85rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 50%;
      }
      #panes {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      #editor,
      #preview {
        flex: 1;
        min-width: 0;
        height: 100%;
        box-sizing: border-box;
      }
      /* CodeMirror manages its own scroller, so the outer pane must not scroll too. */
      #editor {
        overflow: hidden;
        border-right: 1px solid #ddd;
      }
      /* The preview container is the scroll + offset parent for scroll-sync math. Reserve the
         scrollbar gutter so its width never changes when the scrollbar appears. */
      #preview {
        position: relative;
        overflow: auto;
        scrollbar-gutter: stable;
        padding: 0 1.5rem;
      }
      /* View modes. Split (default) shows both panes; code hides the preview and drops the editor's
         divider; formatted hides the editor. These id-scoped rules out-specify the base pane rules
         above (the same specificity lesson as the inline-prompt bars) and are placed after them so
         specificity ascends in source order. The panes are only hidden, never destroyed, so each
         keeps its caret/scroll/DOM across switches. */
      #panes[data-mode="code"] #preview {
        display: none;
      }
      #panes[data-mode="code"] #editor {
        border-right: none;
      }
      #panes[data-mode="formatted"] #editor {
        display: none;
      }
      .cm-editor {
        height: 100%;
      }
      /* Reserve the editor's scrollbar gutter too. Without this, adding height-sync spacers makes
         the scrollbar appear, which narrows the content and re-wraps lines, which changes the
         spacers — an oscillating feedback loop while typing with wrapping on. */
      .cm-scroller {
        scrollbar-gutter: stable;
      }
      #preview img {
        max-width: 100%;
      }
      /* The rendered block matching the editor's cursor line (prominent). */
      #preview .sd-active-block {
        background: #fff7d6;
        box-shadow: -0.4rem 0 0 #fff7d6;
      }
      /* The rendered block under the mouse pointer (faint, auxiliary). */
      #preview .sd-hover-block {
        background: #f2f2f2;
        box-shadow: -0.4rem 0 0 #f2f2f2;
      }
      /* The editor source line under the mouse pointer (faint, auxiliary). */
      .cm-hover-line {
        background: rgba(0, 0, 0, 0.035);
      }
      /* Synthetic height-sync padding inserted between source blocks so each lines up vertically
         with its rendered counterpart. A light-gray cross-diagonal hatch (two opposed gradients,
         gray bands as wide as the clear ones) marks it as service padding, not document content. */
      .cm-sync-spacer {
        background-image: repeating-linear-gradient(
            45deg,
            rgba(0, 0, 0, 0.06),
            rgba(0, 0, 0, 0.06) 4px,
            transparent 4px,
            transparent 8px
          ),
          repeating-linear-gradient(
            -45deg,
            rgba(0, 0, 0, 0.06),
            rgba(0, 0, 0, 0.06) 4px,
            transparent 4px,
            transparent 8px
          );
      }
      #preview table {
        border-collapse: collapse;
      }
      #preview th,
      #preview td {
        border: 1px solid #ccc;
        padding: 0.3rem 0.6rem;
      }
      #preview pre {
        background: #f3f3f3;
        padding: 0.75rem;
        border-radius: 6px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="open-btn" type="button">Open…</button>
      <button id="edit-btn" type="button">Edit</button>
      <button id="save-version-btn" type="button" hidden>Save version</button>
      <button id="discard-btn" type="button" hidden>Discard</button>
      <button id="save-btn" type="button">Save</button>
      <button id="wrap-btn" type="button" aria-pressed="true">Wrap: on</button>
      <span id="view-modes">
        <button id="mode-code" type="button" aria-pressed="false">Code</button>
        <button id="mode-split" type="button" aria-pressed="true">Split</button>
        <button id="mode-formatted" type="button" aria-pressed="false">Formatted</button>
      </span>
      <button id="export-log-btn" type="button">Export log…</button>
      <span id="status">(no document)</span>
    </div>
    <!-- Inline prompt for the draft name (branch), revealed by "Edit". Seeded with the generated
         name; the author may keep or change it before starting to edit. -->
    <div id="branch-name-bar" hidden>
      <label for="branch-name-input">Name new draft</label>
      <input id="branch-name-input" type="text" autocomplete="off" />
      <button id="branch-name-confirm" type="button">Start editing</button>
      <button id="branch-name-cancel" type="button">Cancel</button>
    </div>
    <!-- Inline editor for the version note (commit message), revealed by "Save version". The note is
         seeded by the host and the author edits it before confirming — the one place a "commit
         message" surfaces, in plain words. Single-line by default; the ⌄ button (or Down arrow)
         expands it into a multi-line editor. -->
    <div id="version-note-bar" hidden>
      <label for="version-note-input">Please describe changes</label>
      <input id="version-note-input" type="text" autocomplete="off" />
      <textarea id="version-note-textarea" rows="4" autocomplete="off" hidden></textarea>
      <button id="version-note-expand" type="button" title="More room (Down arrow)" aria-label="Expand to multiple lines">⌄</button>
      <button id="version-note-confirm" type="button">Save</button>
      <button id="version-note-cancel" type="button">Cancel</button>
    </div>
    <div id="panes" data-mode="split">
      <div id="editor"></div>
      <div id="preview"></div>
    </div>

    <script type="module" src="./webview.js"></script>
  </body>
</html>
