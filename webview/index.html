<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpecDesk</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Skip link (a11y §11): the first focusable element, visually hidden until focused, so a keyboard
         user can jump past the toolbar straight into the editor. The handler in index.ts focuses the
         pane visible in the current mode. -->
    <a class="skip-link" href="#editor">Skip to editor</a>
    <div id="toolbar">
      <!-- Collapsible-panel toggles (design concept §9): open/collapse the left rail, bottom dock, and
           right rail. aria-pressed reflects the open state; the glyph shows which edge each controls. -->
      <button id="toggle-left-dock" class="dock-toggle" type="button" aria-pressed="false" aria-controls="left-dock" aria-label="Toggle left panel" title="Toggle left panel">◧</button>
      <nav id="repository-context" aria-label="Current document location">
        <span id="current-repository" title="No repository">No repository</span>
        <span class="context-separator" aria-hidden="true">/</span>
        <span id="current-branch" title="Main version">Main version</span>
        <span class="context-separator" aria-hidden="true">/</span>
        <span id="current-path" title="No document">No document</span>
      </nav>
      <label class="sr-only" for="toolbar-search">Search</label>
      <input id="toolbar-search" type="search" autocomplete="off" placeholder="Search" />
      <button id="toggle-bottom-dock" class="dock-toggle" type="button" aria-pressed="false" aria-controls="bottom-dock" aria-label="Toggle bottom panel" title="Toggle bottom panel">⬓</button>
      <button id="toggle-right-dock" class="dock-toggle" type="button" aria-pressed="false" aria-controls="right-dock" aria-label="Toggle right panel" title="Toggle right panel">◨</button>
      <button id="notifications-btn" class="toolbar-icon" type="button" aria-label="Notifications, none" title="Notifications">♢</button>
      <div id="account-control">
        <button id="github-btn" class="toolbar-icon" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="account-menu" aria-label="Account">●</button>
        <div id="account-menu" role="menu" aria-label="Account" hidden>
          <button id="account-settings" type="button" role="menuitem">Settings</button>
          <button id="reviews-btn" type="button" role="menuitem" hidden>My reviews</button>
          <button id="theme-btn" type="button" role="menuitemcheckbox" aria-checked="false">Dark theme</button>
          <button id="export-log-btn" type="button" role="menuitem">Export diagnostic log…</button>
          <button id="account-help" type="button" role="menuitem">Help</button>
          <hr class="account-menu-separator" />
          <button id="account-connect" type="button" role="menuitem" hidden>Connect to GitHub</button>
          <button id="account-signout" type="button" role="menuitem" hidden>Sign out</button>
        </div>
      </div>
      <span id="toolbar-announcer" class="sr-only" aria-live="polite"></span>
    </div>
    <!-- Inline prompt for the draft name (branch), revealed by "Edit". Seeded with the generated
         name; the author may keep or change it before starting to edit. -->
    <div id="branch-name-bar" hidden>
      <label for="branch-name-input">Name new draft</label>
      <input id="branch-name-input" type="text" autocomplete="off" />
      <button id="branch-name-confirm" type="button">Start editing</button>
      <button id="branch-name-cancel" type="button">Cancel</button>
    </div>
    <!-- Inline editor for the version note (commit message), revealed by "Save version". The note is
         seeded by the host and the author edits it before confirming — the one place a "commit
         message" surfaces, in plain words. Single-line by default; the ⌄ button (or Down arrow)
         expands it into a multi-line editor. -->
    <div id="version-note-bar" hidden>
      <label for="version-note-input">Please describe changes</label>
      <input id="version-note-input" type="text" autocomplete="off" />
      <textarea id="version-note-textarea" rows="4" autocomplete="off" hidden></textarea>
      <button id="version-note-expand" type="button" title="More room (Down arrow)" aria-label="Expand to multiple lines">⌄</button>
      <button id="version-note-confirm" type="button">Save</button>
      <button id="version-note-cancel" type="button">Cancel</button>
    </div>
    <!-- Inline prompt for the review's outward-facing text (PoC-5), revealed by "Send for review": the
         host seeds a title (the last version note) and a short description; the author confirms or edits
         them before the review opens. Plain words — no git/PR vocabulary. -->
    <div id="pr-text-bar" hidden>
      <label for="pr-title-input">Title for reviewers</label>
      <input id="pr-title-input" type="text" autocomplete="off" />
      <textarea id="pr-body-textarea" rows="3" autocomplete="off" placeholder="A short description (optional)"></textarea>
      <button id="pr-text-confirm" type="button">Send for review</button>
      <button id="pr-text-cancel" type="button">Cancel</button>
    </div>
    <!-- Sign-in code bar (PoC-5), revealed while connecting a GitHub account: shows the one-time code to
         enter at GitHub, a button to open the page, and a waiting/result line. Plain words only. -->
    <div id="github-signin-bar" hidden>
      <span id="github-signin-text">To connect, open GitHub and enter this code:</span>
      <code id="github-user-code"></code>
      <button id="github-open-btn" type="button">Open GitHub</button>
      <span id="github-signin-status" aria-live="polite"></span>
      <button id="github-cancel-btn" type="button">Cancel</button>
    </div>
    <!-- Your open reviews (PoC-5), revealed by "My reviews": the PRs you authored or were asked to review,
         each opening on GitHub, plus a field to open any review by pasting its link. Plain words only. -->
    <div id="reviews-panel" hidden>
      <div id="reviews-panel-head">
        <span id="reviews-panel-title">Your open reviews</span>
        <button id="reviews-close" type="button">Close</button>
      </div>
      <div id="reviews-open-by-url">
        <label for="reviews-url-input">Open a review by link</label>
        <input id="reviews-url-input" type="text" autocomplete="off" placeholder="Paste a review link" />
        <button id="reviews-url-open" type="button">Open</button>
      </div>
      <ul id="reviews-list" aria-live="polite"></ul>
      <span id="reviews-status" aria-live="polite"></span>
    </div>
    <!-- Shown only while "Show changes" is on and the working copy matches the last saved version, so
         the author isn't left wondering why nothing is highlighted. -->
    <div id="review-empty-bar" role="status" hidden>No changes since the last saved version.</div>
    <!-- Shown only while "Show changes" is on and the compare overflowed the native size guard (a
         pathologically large document) — nothing is highlighted, so the author isn't left wondering why,
         and isn't shown the "no changes" notice either (there ARE changes, just too many to diff). -->
    <div id="review-overflow-bar" role="status" hidden>
      Too many changes to show in detail — the document is too large to compare closely.
    </div>
    <!-- Workspace: the collapsible-panel shell (design concept §9). The toolbar and inline bars stack
         above; this region fills the rest. A main row (left rail · centre · right rail) stacks over a
         full-width bottom dock. The centre is the CentralFrame host (workspace/central-frame.ts): #editor-view
         (the formatting toolbar over the panes) is its primary "editor" view, and the left-rail navigation
         swaps in other registered views. The docks start collapsed; workspace/dock.ts builds each one's
         chrome (an icon rail + a header with the active mode's title + collapse) and content. -->
    <div id="workspace">
      <div id="workspace-main">
        <!-- Dock containers (design concept §9): collapsed by default; dock.ts fills each with a header and
             the active tool. The left rail's navigator is a real tool that brings its own <nav> landmark
             (workspace/tools/navigator.ts); the remaining tools are placeholders, so a dock-level landmark
             stays deferred until they land. -->
        <div id="left-dock" class="dock dock-left" hidden></div>
        <!-- The central frame is the app's main content region; data-view names the active central view,
             which central-frame.ts seeds from and keeps in sync (it starts on the editor). -->
        <main id="central-frame" data-view="editor">
          <!-- The editor central view: the formatting toolbar (now part of the editor's working area, not a
               full-width row above the panels) over the panes. central-view(-active) mark it as the active
               primary central view (see workspace/central-frame.ts); index.ts registers it under "editor". -->
          <div id="editor-view" class="central-view central-view--active">
            <div id="editor-toolbar" role="toolbar" aria-label="Markdown editor controls">
              <div id="editor-actions">
                <button id="open-btn" type="button">Open…</button>
                <button id="edit-btn" type="button">Edit</button>
                <button id="save-version-btn" type="button" hidden>Save version</button>
                <button id="send-for-review-btn" type="button" hidden>Send for review</button>
                <button id="update-review-btn" type="button" hidden>Update review</button>
                <button id="discard-btn" type="button" hidden>Discard</button>
                <button id="save-btn" type="button">Save</button>
                <button id="compare-btn" type="button" aria-pressed="false" title="Highlight changes against the last saved version">Show changes</button>
                <button id="wrap-btn" type="button" aria-pressed="true">Wrap: on</button>
                <!-- A button-based radiogroup (segmented control): index.ts implements the WAI-ARIA
                     roving-tabindex and arrow-key pattern and derives the initial selection from #panes. -->
                <span id="view-modes" role="radiogroup" aria-label="View mode">
                  <!-- biome-ignore lint/a11y/useSemanticElements: button-based radiogroup, see above -->
                  <button id="mode-code" type="button" role="radio" aria-checked="false" tabindex="-1">Code</button>
                  <!-- biome-ignore lint/a11y/useSemanticElements: button-based radiogroup, see above -->
                  <button id="mode-split" type="button" role="radio" aria-checked="false" tabindex="-1">Split</button>
                  <!-- biome-ignore lint/a11y/useSemanticElements: button-based radiogroup, see above -->
                  <button id="mode-formatted" type="button" role="radio" aria-checked="false" tabindex="-1">Formatted</button>
                </span>
                <span id="status" aria-live="polite">(no document)</span>
              </div>
              <!-- Formatting controls appear while editing. They route to ProseMirror in Formatted and
                   Markdown text transforms in Code/Split. -->
              <div id="format-bar" hidden>
              <button id="fmt-bold" type="button" data-format="bold" aria-pressed="false" title="Bold (Ctrl+B)" aria-label="Bold (Ctrl+B)">B</button>
              <button id="fmt-italic" type="button" data-format="italic" aria-pressed="false" title="Italic (Ctrl+I)" aria-label="Italic (Ctrl+I)">I</button>
              <button id="fmt-strike" type="button" data-format="strike" aria-pressed="false" title="Strikethrough (Ctrl+Shift+X)" aria-label="Strikethrough (Ctrl+Shift+X)">S</button>
              <span class="fmt-sep" aria-hidden="true"></span>
              <button id="fmt-h1" type="button" data-format="h1" aria-pressed="false" title="Heading 1 (Ctrl+Alt+1)" aria-label="Heading 1 (Ctrl+Alt+1)">H1</button>
              <button id="fmt-h2" type="button" data-format="h2" aria-pressed="false" title="Heading 2 (Ctrl+Alt+2)" aria-label="Heading 2 (Ctrl+Alt+2)">H2</button>
              <span class="fmt-sep" aria-hidden="true"></span>
              <button id="fmt-bullet" type="button" data-format="bullet" aria-pressed="false" title="Bullet list (Ctrl+Shift+8)" aria-label="Bullet list (Ctrl+Shift+8)">• List</button>
              <button id="fmt-ordered" type="button" data-format="ordered" aria-pressed="false" title="Numbered list (Ctrl+Shift+7)" aria-label="Numbered list (Ctrl+Shift+7)">1. List</button>
              <button id="fmt-quote" type="button" data-format="quote" aria-pressed="false" title="Quote (Ctrl+Shift+&gt;)" aria-label="Quote (Ctrl+Shift+&gt;)">«»</button>
              <button id="fmt-code" type="button" data-format="code" aria-pressed="false" title="Code block (Ctrl+Shift+E)" aria-label="Code block (Ctrl+Shift+E)">&lt;/&gt;</button>
              </div>
            </div>
            <!-- data-mode is the single declared source of truth for the STARTING view mode: index.ts reads
                 it back into its `mode` variable at startup (see the comment there) instead of repeating the
                 literal, and the CSS keys pane visibility off this same attribute. -->
            <div id="panes" data-mode="split">
              <div id="editor"></div>
              <div id="preview" class="sd-doc"></div>
              <div id="formatted"></div>
            </div>
          </div>
          <!-- The Start central view (workspace/tools/home-view.ts fills it): a calm open-a-spec screen the
               left-rail navigator switches to. Starts hidden (no central-view--active) — the CSS hide rule
               keeps it out of the layout until shown. -->
          <div id="home-view" class="central-view"></div>
        </main>
        <div id="right-dock" class="dock dock-right" hidden></div>
      </div>
      <div id="bottom-dock" class="dock dock-bottom" hidden></div>
    </div>

    <script type="module" src="./webview.js"></script>
  </body>
</html>
